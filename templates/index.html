{% extends "base.html" %}
{% block title %}Projects — Brand Visibility{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Your Projects</h1>
    <div class="space-y-3">
        {% for p in projects %}
        <a href="{{ url_for('dashboard', project_id=p.id) }}"
           class="block bg-white rounded-xl border border-surface-200 p-5 hover:border-brand-300 hover:shadow-md transition-all stat-card">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-semibold text-gray-900">{{ p.name }}</h2>
                    <p class="text-sm text-gray-500">{{ p.domain }}</p>
                </div>
                <svg class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </div>
        </a>
        {% endfor %}
    </div>
    <a href="{{ url_for('new_project') }}"
       class="mt-6 block text-center py-3 border-2 border-dashed border-surface-300 rounded-xl text-sm font-semibold text-gray-500 hover:text-brand-600 hover:border-brand-300 transition-colors">
        + Add New Project
    </a>
</div>
{% endblock %}
